<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1.0
        "
    />

    <title>
        Random Cat Viewer
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    />

</head>

<body>

    <header class="navbar">

        <h1>
            Random Cat Viewer
        </h1>

        <button id="theme-btn">

            Toggle Theme

        </button>

    </header>



    <main class="main-container">

        <div
            id="cat-card"
            class="cat-card"
        >

        </div>

    </main>



    <div id="loader">

        Loading Cat...

    </div>



    <!-- MODAL -->

    <div id="modal" class="modal">

        <div class="modal-content">

            <button id="close-btn">

                ✕

            </button>

            <div id="modal-body">

            </div>

        </div>

    </div>



    <script src="script.js"></script>

</body>

</html>
